<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - CF Scanner</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      body {
        align-items: center;
        display: flex;
        min-height: 100vh;
        justify-content: center;
        margin: 0;
        padding: 20px;
      }

      main {
        background: #ffffff;
        border: 1px solid #d8deea;
        border-radius: 8px;
        max-width: 380px;
        padding: 28px;
        width: 100%;
      }

      h1 {
        font-size: 22px;
        letter-spacing: 0;
        margin: 0 0 8px;
      }

      p {
        color: #546179;
        font-size: 14px;
        margin: 0 0 22px;
      }

      label {
        color: #34415a;
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      input {
        border: 1px solid #c9d2e3;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 16px;
        margin-bottom: 14px;
        padding: 11px 12px;
        width: 100%;
      }

      button {
        background: #1f6feb;
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        padding: 11px 12px;
        width: 100%;
      }

      .error {
        background: #fee2e2;
        border: 1px solid #fecaca;
        border-radius: 6px;
        color: #991b1b;
        display: none;
        font-size: 13px;
        margin-bottom: 14px;
        padding: 10px 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CF Scanner</h1>
      <p>Sign in to view your personal scanner dashboard.</p>
      <div class="error" id="error">Incorrect password.</div>
      <form method="post" action="/login">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" autofocus required />
        <button type="submit">Login</button>
      </form>
    </main>
    <script>
      if (new URLSearchParams(window.location.search).get("error")) {
        document.getElementById("error").style.display = "block";
      }
    </script>
  </body>
</html>
