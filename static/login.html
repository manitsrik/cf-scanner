<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - CF Scanner</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #eef3f8;
        --surface: #ffffff;
        --border: #d9e2ef;
        --text: #152033;
        --muted: #64748b;
        --primary: #2563eb;
        --primary-text: #ffffff;
        --focus: #dbeafe;
        --danger-bg: #fee2e2;
        --danger-border: #fecaca;
        --danger-text: #991b1b;
        background: var(--bg);
        color: var(--text);
      }

      [data-theme="dark"] {
        color-scheme: dark;
        --bg: #0f172a;
        --surface: #111c2f;
        --border: #26364f;
        --text: #e5edf8;
        --muted: #9fb0c7;
        --primary: #3b82f6;
        --primary-text: #ffffff;
        --focus: #172554;
        --danger-bg: #451a1a;
        --danger-border: #7f1d1d;
        --danger-text: #fecaca;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background: var(--bg);
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 20px;
      }

      main {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        max-width: 400px;
        padding: 30px;
        width: 100%;
      }

      .eyebrow {
        color: var(--primary);
        font-size: 12px;
        font-weight: 850;
        letter-spacing: 0.05em;
        margin-bottom: 10px;
        text-transform: uppercase;
      }

      h1 {
        font-size: 24px;
        letter-spacing: 0;
        line-height: 1.2;
        margin: 0 0 8px;
      }

      p {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
        margin: 0 0 24px;
      }

      label {
        color: var(--text);
        display: block;
        font-size: 13px;
        font-weight: 800;
        margin-bottom: 8px;
      }

      input {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 7px;
        font-size: 16px;
        margin-bottom: 14px;
        min-height: 44px;
        padding: 0 12px;
        width: 100%;
      }

      input:focus {
        border-color: var(--primary);
        outline: 3px solid var(--focus);
      }

      button {
        background: var(--primary);
        border: 0;
        border-radius: 7px;
        color: var(--primary-text);
        cursor: pointer;
        font-size: 14px;
        font-weight: 800;
        min-height: 42px;
        width: 100%;
      }

      .error {
        background: var(--danger-bg);
        border: 1px solid var(--danger-border);
        border-radius: 7px;
        color: var(--danger-text);
        display: none;
        font-size: 13px;
        margin-bottom: 14px;
        padding: 10px 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Personal Scanner</div>
      <h1>Sign in to CF Scanner</h1>
      <p>View your private futures watchlist, signal feed, and Telegram alert status.</p>
      <div class="error" id="error">Incorrect password.</div>
      <form method="post" action="/login">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" autofocus required />
        <button type="submit">Login</button>
      </form>
      <button class="theme-toggle" id="themeButton" type="button">Dark</button>
    </main>
    <script>
      const themeButton = document.getElementById("themeButton");

      function applyTheme(theme) {
        document.documentElement.dataset.theme = theme;
        themeButton.textContent = theme === "dark" ? "Light" : "Dark";
        localStorage.setItem("cf-scanner-theme", theme);
      }

      themeButton.addEventListener("click", () => {
        const current = document.documentElement.dataset.theme === "dark" ? "dark" : "light";
        applyTheme(current === "dark" ? "light" : "dark");
      });

      applyTheme(localStorage.getItem("cf-scanner-theme") || "light");

      if (new URLSearchParams(window.location.search).get("error")) {
        document.getElementById("error").style.display = "block";
      }
    </script>
  </body>
</html>
      .theme-toggle {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
        margin-top: 12px;
      }
