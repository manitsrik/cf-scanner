<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - CF Scanner</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef3f8;
        color: #152033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background: #eef3f8;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 20px;
      }

      main {
        background: #ffffff;
        border: 1px solid #d9e2ef;
        border-radius: 8px;
        max-width: 400px;
        padding: 30px;
        width: 100%;
      }

      .eyebrow {
        color: #2563eb;
        font-size: 12px;
        font-weight: 850;
        letter-spacing: 0.05em;
        margin-bottom: 10px;
        text-transform: uppercase;
      }

      h1 {
        font-size: 24px;
        letter-spacing: 0;
        line-height: 1.2;
        margin: 0 0 8px;
      }

      p {
        color: #64748b;
        font-size: 14px;
        line-height: 1.5;
        margin: 0 0 24px;
      }

      label {
        color: #334155;
        display: block;
        font-size: 13px;
        font-weight: 800;
        margin-bottom: 8px;
      }

      input {
        border: 1px solid #cbd5e1;
        border-radius: 7px;
        font-size: 16px;
        margin-bottom: 14px;
        min-height: 44px;
        padding: 0 12px;
        width: 100%;
      }

      input:focus {
        border-color: #2563eb;
        outline: 3px solid #dbeafe;
      }

      button {
        background: #2563eb;
        border: 0;
        border-radius: 7px;
        color: #ffffff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 800;
        min-height: 42px;
        width: 100%;
      }

      .error {
        background: #fee2e2;
        border: 1px solid #fecaca;
        border-radius: 7px;
        color: #991b1b;
        display: none;
        font-size: 13px;
        margin-bottom: 14px;
        padding: 10px 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Personal Scanner</div>
      <h1>Sign in to CF Scanner</h1>
      <p>View your private futures watchlist, signal feed, and Telegram alert status.</p>
      <div class="error" id="error">Incorrect password.</div>
      <form method="post" action="/login">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" autofocus required />
        <button type="submit">Login</button>
      </form>
    </main>
    <script>
      if (new URLSearchParams(window.location.search).get("error")) {
        document.getElementById("error").style.display = "block";
      }
    </script>
  </body>
</html>
