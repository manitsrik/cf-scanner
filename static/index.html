<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CF Scanner</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      body {
        margin: 0;
      }

      header {
        align-items: center;
        background: #ffffff;
        border-bottom: 1px solid #d8deea;
        display: flex;
        justify-content: space-between;
        padding: 18px clamp(16px, 4vw, 44px);
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0;
        margin: 0;
      }

      main {
        padding: 24px clamp(16px, 4vw, 44px);
      }

      .status {
        color: #546179;
        font-size: 14px;
      }

      .table-wrap {
        background: #ffffff;
        border: 1px solid #d8deea;
        border-radius: 8px;
        overflow-x: auto;
      }

      table {
        border-collapse: collapse;
        min-width: 920px;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid #edf0f6;
        padding: 14px 16px;
        text-align: left;
        white-space: nowrap;
      }

      th {
        background: #f9fafc;
        color: #546179;
        font-size: 12px;
        text-transform: uppercase;
      }

      td {
        font-size: 14px;
      }

      .badge {
        border-radius: 999px;
        display: inline-block;
        font-size: 12px;
        font-weight: 700;
        padding: 5px 9px;
      }

      .LONG {
        background: #dcfce7;
        color: #166534;
      }

      .SHORT {
        background: #fee2e2;
        color: #991b1b;
      }

      a {
        color: #1d4ed8;
        text-decoration: none;
      }

      .empty {
        color: #6b7280;
        padding: 28px 16px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Crypto Futures Pattern Scanner</h1>
      <div class="status" id="status">Loading...</div>
    </header>

    <main>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Timeframe</th>
              <th>Signal</th>
              <th>Price</th>
              <th>RSI</th>
              <th>Volume Status</th>
              <th>Created Time</th>
              <th>TradingView</th>
            </tr>
          </thead>
          <tbody id="signals">
            <tr>
              <td class="empty" colspan="8">Waiting for signals...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const signalsEl = document.getElementById("signals");

      function formatPrice(value) {
        return Number(value).toLocaleString(undefined, { maximumFractionDigits: 4 });
      }

      function formatTime(value) {
        return new Date(value).toLocaleString();
      }

      async function loadSignals() {
        try {
          const response = await fetch("/signals");
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const signals = await response.json();
          statusEl.textContent = `Live - ${signals.length} signal${signals.length === 1 ? "" : "s"}`;

          if (!signals.length) {
            signalsEl.innerHTML = '<tr><td class="empty" colspan="8">Waiting for signals...</td></tr>';
            return;
          }

          signalsEl.innerHTML = signals
            .map(
              (signal) => `
                <tr>
                  <td>${signal.symbol}</td>
                  <td>${signal.timeframe}</td>
                  <td><span class="badge ${signal.signal_type}">${signal.signal_type}</span></td>
                  <td>${formatPrice(signal.price)}</td>
                  <td>${Number(signal.rsi).toFixed(2)}</td>
                  <td>${signal.volume_status}</td>
                  <td>${formatTime(signal.created_at)}</td>
                  <td><a href="${signal.tradingview_url}" target="_blank" rel="noreferrer">Open chart</a></td>
                </tr>
              `
            )
            .join("");
        } catch (error) {
          statusEl.textContent = "API unavailable";
        }
      }

      loadSignals();
      setInterval(loadSignals, 15000);
    </script>
  </body>
</html>
